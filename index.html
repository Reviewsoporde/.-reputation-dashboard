<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reputation Dashboard - Week 23</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Geist+Mono:wght@300;400;500&display=swap');
:root{--bg:#F7F7F5;--surface:#FFFFFF;--border:#E4E4DF;--border-light:#EFEFEB;--text-primary:#1A1A18;--text-secondary:#6B6B65;--text-tertiary:#A8A8A2;--blue:#2563EB;--green:#16A34A;--amber:#D97706;--red:#DC2626;--blue-light:#EFF6FF;--green-light:#F0FDF4;--amber-light:#FFFBEB;--red-light:#FEF2F2;--radius:10px;--mono:'Geist Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text-primary);font-size:14px;line-height:1.5;}
.shell{max-width:1200px;margin:0 auto;padding:2rem 1.5rem;}
.topbar{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:1.5rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border);}
.topbar-left h1{font-size:22px;font-weight:600;letter-spacing:-0.02em;}
.topbar-left span{font-size:13px;color:var(--text-secondary);margin-top:2px;display:block;}
.topbar-right{font-size:12px;color:var(--text-tertiary);font-family:var(--mono);}
.week-nav-wrap{margin-bottom:1.5rem;}
.week-nav-label{font-size:11px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.5rem;}
.week-nav{display:flex;gap:4px;flex-wrap:wrap;align-items:center;}
.week-nav button{font-family:'Inter',sans-serif;font-size:12px;padding:4px 10px;border-radius:99px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-secondary);transition:all .15s;}
.week-nav button:hover{background:var(--surface);color:var(--text-primary);}
.week-nav button.wk-active{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:500;}
.week-nav .wk-latest{border-color:var(--blue);color:var(--blue);font-weight:500;}
.week-nav .wk-latest.wk-active{background:var(--blue);color:#fff;}
.nav{display:flex;gap:4px;margin-bottom:1.75rem;flex-wrap:wrap;}
.nav button{font-family:'Inter',sans-serif;font-size:13px;padding:6px 14px;border-radius:99px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-secondary);transition:all .15s;}
.nav button:hover{background:var(--surface);color:var(--text-primary);}
.nav button.active{background:var(--text-primary);color:#fff;border-color:var(--text-primary);font-weight:500;}
.page{display:none;}.page.active{display:block;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:1.25rem;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:1.25rem;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;}
.ct{font-size:13px;font-weight:500;color:var(--text-primary);margin-bottom:4px;}
.cs{font-size:12px;color:var(--text-secondary);margin-bottom:10px;}
.kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:1.25rem;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
.kpi-l{font-size:11px;color:var(--text-secondary);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;font-weight:500;}
.kpi-v{font-size:22px;font-weight:400;letter-spacing:-0.01em;margin-bottom:3px;font-family:var(--mono);}
.kpi-d{font-size:12px;}
.up{color:var(--green);}.dn{color:var(--red);}.neu{color:var(--text-tertiary);}
.leg{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px;font-size:11px;color:var(--text-secondary);}
.leg span{display:flex;align-items:center;gap:4px;}
.ld{width:16px;height:3px;border-radius:99px;display:inline-block;}
.ldd{width:16px;height:3px;border-radius:99px;display:inline-block;background:repeating-linear-gradient(90deg,currentColor 0,currentColor 4px,transparent 4px,transparent 7px);}
.sec-title{font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.07em;margin:1.75rem 0 .75rem;}
.bdg{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500;}
.b-blue{background:var(--blue-light);color:var(--blue);}
.b-green{background:var(--green-light);color:var(--green);}
.b-amber{background:var(--amber-light);color:var(--amber);}
.b-red{background:var(--red-light);color:var(--red);}
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th{font-size:10px;font-weight:600;color:var(--text-secondary);padding:6px 10px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;text-transform:uppercase;letter-spacing:.05em;}
.tbl td{padding:9px 10px;border-bottom:1px solid var(--border-light);white-space:nowrap;vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl .tr-total td{font-weight:600;background:var(--bg);border-top:1px solid var(--border);}
.tbl .tr-group td{background:var(--bg);font-size:10px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.07em;padding:10px 10px 4px;border-bottom:none;border-top:1px solid var(--border);}
.tbl .tr-group:first-child td{border-top:none;}
.ybox{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-top:1rem;}
.co-bar{display:flex;align-items:center;gap:10px;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--border);}
.co-name{font-size:16px;font-weight:600;letter-spacing:-0.01em;}
.ch-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:1.25rem;}
.ch{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;}
.ch-title{font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:1px;}
.ch-subtitle{font-size:11px;color:var(--text-secondary);margin-bottom:10px;}
.ch-score-row{display:flex;align-items:baseline;gap:8px;margin-bottom:6px;}
.ch-score-now{font-size:26px;font-weight:300;font-family:var(--mono);letter-spacing:-0.02em;}
.ch-score-meta{font-size:12px;color:var(--text-secondary);}
.ch-bar{height:6px;background:var(--border-light);border-radius:99px;overflow:hidden;margin-bottom:10px;}
.ch-fill{height:100%;border-radius:99px;}
.ch-stats{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;margin-bottom:10px;}
.ch-stat{font-size:11px;color:var(--text-secondary);}
.ch-stat b{color:var(--text-primary);font-weight:500;}
.ch-incoming{padding-top:10px;border-top:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:center;}
.ch-incoming-label{font-size:11px;color:var(--text-secondary);}
.ch-incoming-val{font-size:14px;font-weight:400;font-family:var(--mono);}
.prog-list{display:flex;flex-direction:column;gap:14px;}
.prog-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
.prog-name{font-size:13px;font-weight:500;}
.prog-vals{font-size:12px;color:var(--text-secondary);font-family:var(--mono);}
.prog-track{height:7px;background:var(--border-light);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;border-radius:99px;}
.prog-goal{font-size:11px;color:var(--text-tertiary);margin-top:4px;text-align:right;font-family:var(--mono);}
.datum-list{display:flex;flex-direction:column;gap:12px;}
.datum-item{display:flex;align-items:center;gap:12px;}
.datum-name{font-size:12px;font-weight:500;width:110px;flex-shrink:0;}
.datum-track{flex:1;height:6px;background:var(--border-light);border-radius:99px;overflow:hidden;}
.datum-fill{height:100%;border-radius:99px;}
.datum-val{font-family:var(--mono);font-size:12px;color:var(--text-secondary);width:100px;text-align:right;flex-shrink:0;}
.sub-group{margin-bottom:1.25rem;}
.sub-group-title{font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.6rem;padding-bottom:6px;border-bottom:1px solid var(--border);}
.ch-sm-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:.75rem;}
.ch-sm{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
.ch-sm-name{font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em;}
.ch-sm-score{font-size:18px;font-weight:300;font-family:var(--mono);margin-bottom:6px;}
.ch-sm-bar{height:5px;background:var(--border-light);border-radius:99px;overflow:hidden;margin-bottom:8px;}
.ch-sm-fill{height:100%;border-radius:99px;}
.ch-sm-stats{display:flex;gap:10px;margin-bottom:8px;}
.ch-sm-stat{font-size:11px;color:var(--text-secondary);}
.ch-sm-stat b{display:block;font-size:13px;font-weight:400;color:var(--text-primary);font-family:var(--mono);}
